[uwsgi]
#socket = 0.0.0.0:8000
http-socket = 0.0.0.0:8000

# Directory used by prometheus_client multiprocess mode. Ensure this directory is
# writable by the process user and mounted/shared between workers if running in containers.
env = PROMETHEUS_MULTIPROC_DIR=/tmp/warp_prom

master = True
log-master = True
buffer-size=32768

# Control request logging: by default uWSGI logs every request. To avoid noisy
# access lines and only log error responses, enable logging for 4xx/5xx and
# disable generic request logging. This keeps the uwsgi log quieter while
# allowing error traffic to be visible. Adjust as needed.
log-4xx = true
log-5xx = true
disable-logging = true

processes = 4
threads = 2
offload-threads = 2

mimefile = /etc/mime.types
die-on-term = True

module = warp:create_app()

route = ^/static/ goto:static
route-run = last:

route-label = static
route = ^/static/(.*) rewrite:$1
route-if = isfile:/opt/warp/static/${PATH_INFO} static:/opt/warp/static/${PATH_INFO}
route-run = addheader:Cache-Control: no-cache
route-run = return:404
